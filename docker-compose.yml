version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: erp_database
    restart: always
    environment:
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data

volumes:
  erp_pgdata:
